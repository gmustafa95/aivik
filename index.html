<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIVIK</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:ital,wght@1,700&family=Montserrat:wght@800&family=Space+Mono:wght@700&family=Cinzel:wght@700&family=Bebas+Neue&family=Righteous&family=Lobster&family=Abril+Fatface&family=Oswald:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 1rem;
    }

    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 80vw;
      height: 70vh;
      background: radial-gradient(ellipse at center, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 60vw;
      height: 50vh;
      background: radial-gradient(ellipse at center, rgba(168, 85, 247, 0.1) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 720px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 0.12em;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.9s ease both;
      line-height: 1;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(2.8rem, 10vw, 6rem);
      font-weight: 700;
      letter-spacing: -0.01em;
      color: #ffffff;
      background: linear-gradient(135deg, #6366f1 0%, #818cf8 55%, #38bdf8 100%);
      border-radius: 0.22em;
      padding: 0.08em 0.22em;
      line-height: 1.2;
      box-shadow: 0 0 32px rgba(99, 102, 241, 0.35), 0 0 8px rgba(56, 189, 248, 0.2);
    }

    .logo-text {
      font-size: clamp(2.8rem, 10vw, 6rem);
      font-weight: 700;
      letter-spacing: -0.01em;
      color: #e8e8f0;
      line-height: 1.2;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, #818cf8, #38bdf8);
      margin: 0 auto 2rem;
      border-radius: 2px;
      animation: fadeUp 0.9s 0.15s ease both;
    }

    .tagline {
      font-size: clamp(0.95rem, 2.5vw, 1.15rem);
      font-weight: 300;
      color: #94a3b8;
      letter-spacing: 0.05em;
      line-height: 1.7;
      animation: fadeUp 0.9s 0.25s ease both;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 2.5rem;
      padding: 0.55rem 1.25rem;
      border: 1px solid rgba(129, 140, 248, 0.3);
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #a78bfa;
      background: rgba(129, 140, 248, 0.06);
      animation: fadeUp 0.9s 0.4s ease both;
    }

    .badge .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #a78bfa;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    footer {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      color: #334155;
      letter-spacing: 0.06em;
      z-index: 1;
    }

    /* Theme toggle */
    .theme-toggle {
      position: fixed;
      top: 1.25rem;
      right: 1.5rem;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }

    .toggle-track {
      width: 44px;
      height: 24px;
      background: rgba(129, 140, 248, 0.15);
      border: 1px solid rgba(129, 140, 248, 0.3);
      border-radius: 100px;
      position: relative;
      transition: background 0.3s, border-color 0.3s;
    }

    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #818cf8;
      transition: transform 0.3s, background 0.3s;
      box-shadow: 0 0 6px rgba(129, 140, 248, 0.5);
    }

    .toggle-icon {
      font-size: 1rem;
      line-height: 1;
      user-select: none;
    }

    /* Light mode */
    body.light {
      background: #f0f2ff;
      color: #1a1a2e;
    }

    body.light::before {
      background: radial-gradient(ellipse at center, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
    }

    body.light::after {
      background: radial-gradient(ellipse at center, rgba(168, 85, 247, 0.06) 0%, transparent 70%);
    }

    body.light .logo-text {
      color: #1a1a2e;
    }

    body.light .tagline {
      color: #475569;
    }

    body.light footer {
      color: #94a3b8;
    }

    body.light .toggle-track {
      background: rgba(99, 102, 241, 0.12);
      border-color: rgba(99, 102, 241, 0.3);
    }

    body.light .toggle-thumb {
      transform: translateX(20px);
      background: #6366f1;
      box-shadow: 0 0 6px rgba(99, 102, 241, 0.5);
    }
  </style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle light/dark mode">
    <span class="toggle-icon">☀️</span>
    <span class="toggle-track"><span class="toggle-thumb"></span></span>
    <span class="toggle-icon">🌙</span>
  </button>
  <div class="container">
    <!-- Logo 1 (Original) -->
    <h1 class="logo">
      <span class="logo-badge">AI</span><span class="logo-text">vik</span>
    </h1>

    <!-- Logo 2 -->
    <h1 class="logo" style="font-family: 'Playfair Display', serif;">
      <span class="logo-badge" style="background: linear-gradient(135deg, #27272a 0%, #18181b 100%); color: #fafafa; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);">AI</span><span class="logo-text">vik</span>
    </h1>

    <!-- Logo 3 -->
    <h1 class="logo" style="font-family: 'Space Mono', monospace;">
      <span class="logo-badge">AI</span><span class="logo-text">vik</span>
    </h1>

    <!-- Logo 4 -->
    <h1 class="logo" style="font-family: 'Cinzel', serif;">
      <span class="logo-badge" style="background: linear-gradient(135deg, #c28d75 0%, #905d47 100%); color: #fff; box-shadow: 0 8px 24px rgba(194, 141, 117, 0.25);">AI</span><span class="logo-text">vik</span>
    </h1>

    <!-- Logo 5 -->
    <h1 class="logo" style="font-family: 'Bebas Neue', sans-serif;">
      <span class="logo-badge" style="background: #eab308; color: #171717; box-shadow: 4px 4px 0px #171717, 0 0 24px rgba(234, 179, 8, 0.2); border: 2px solid #171717; border-radius: 0;">AI</span><span class="logo-text">vik</span>
    </h1>

    <!-- Logo 6 -->
    <h1 class="logo" style="font-family: 'Righteous', cursive;">
      <span class="logo-badge" style="background: #fafafa; color: #09090b; box-shadow: 0 8px 32px rgba(250, 250, 250, 0.15);">AI</span><span class="logo-text">vik</span>
    </h1>

    <!-- Logo 7 -->
    <h1 class="logo" style="font-family: 'Lobster', cursive;">
      <span class="logo-badge" style="background: linear-gradient(135deg, #2d4a22 0%, #15270f 100%); color: #e4e4e7; box-shadow: 0 8px 32px rgba(45, 74, 34, 0.3);">AI</span><span class="logo-text">vik</span>
    </h1>

    <!-- Logo 8 -->
    <h1 class="logo" style="font-family: 'Abril Fatface', cursive;">
      <span class="logo-badge" style="background: linear-gradient(135deg, #d4af37 0%, #aa801e 100%); color: #18181b; box-shadow: 0 8px 32px rgba(212, 175, 55, 0.2);">AI</span><span class="logo-text">vik</span>
    </h1>

    <!-- Logo 9 -->
    <h1 class="logo" style="font-family: 'Oswald', sans-serif;">
      <span class="logo-badge" style="background: linear-gradient(135deg, #8b8fb0 0%, #5d6182 100%); color: #fff; box-shadow: 0 8px 32px rgba(139, 143, 176, 0.3);">AI</span><span class="logo-text">vik</span>
    </h1>

    <!-- Logo 10 -->
    <h1 class="logo" style="font-family: 'Montserrat', sans-serif;">
      <span class="logo-badge" style="background: linear-gradient(135deg, #811331 0%, #4a091a 100%); color: #ffd1dc; box-shadow: 0 8px 32px rgba(129, 19, 49, 0.4);">AI</span><span class="logo-text">vik</span>
    </h1>

    <!-- Logo 11 (From Image) -->
    <h1 class="logo">
      <span class="logo-badge" style="font-family: 'Courier New', Courier, monospace; font-weight: 700; background: linear-gradient(135deg, #c026d3 0%, #3b82f6 100%); color: #ffffff; box-shadow: 0 0 32px rgba(192, 38, 211, 0.3), 0 0 20px rgba(59, 130, 246, 0.3); border-radius: 0.3em; padding: 0.1em 0.25em;">AI</span><span class="logo-text" style="font-family: 'Space Mono', Courier, monospace; margin-left: 0.15em;">vik</span>
    </h1>

    <div class="divider"></div>
    <p class="tagline">Something remarkable is on its way.<br />We are crafting the experience - stay tuned.</p>
    <div class="badge">
      <span class="dot"></span>
      Under Development
    </div>
  </div>
  <footer>&copy; 2026 AIVIK. All rights reserved.</footer>
  <script>
    const toggle = document.getElementById('themeToggle');
    if (localStorage.getItem('theme') === 'light') {
      document.body.classList.add('light');
    }
    toggle.addEventListener('click', () => {
      document.body.classList.toggle('light');
      localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
    });
  </script>
</body>
</html>
