<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIVIK</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 80vw;
      height: 70vh;
      background: radial-gradient(ellipse at center, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 60vw;
      height: 50vh;
      background: radial-gradient(ellipse at center, rgba(168, 85, 247, 0.1) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 720px;
    }

    .logo {
      font-size: clamp(4rem, 14vw, 8rem);
      font-weight: 700;
      letter-spacing: 0.15em;
      background: linear-gradient(135deg, #a78bfa 0%, #818cf8 40%, #38bdf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.9s ease both;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, #818cf8, #38bdf8);
      margin: 0 auto 2rem;
      border-radius: 2px;
      animation: fadeUp 0.9s 0.15s ease both;
    }

    .tagline {
      font-size: clamp(0.95rem, 2.5vw, 1.15rem);
      font-weight: 300;
      color: #94a3b8;
      letter-spacing: 0.05em;
      line-height: 1.7;
      animation: fadeUp 0.9s 0.25s ease both;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 2.5rem;
      padding: 0.55rem 1.25rem;
      border: 1px solid rgba(129, 140, 248, 0.3);
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #a78bfa;
      background: rgba(129, 140, 248, 0.06);
      animation: fadeUp 0.9s 0.4s ease both;
    }

    .badge .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #a78bfa;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    footer {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      color: #334155;
      letter-spacing: 0.06em;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="logo">AIVIK</h1>
    <div class="divider"></div>
    <p class="tagline">Something remarkable is on its way.<br />We are crafting the experience - stay tuned.</p>
    <div class="badge">
      <span class="dot"></span>
      Under Development
    </div>
  </div>
  <footer>&copy; 2025 AIVIK. All rights reserved.</footer>
</body>
</html>
